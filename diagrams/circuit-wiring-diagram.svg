<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 620" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrow2" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#4a5578" />
    </marker>
  </defs>
  <rect width="1000" height="620" fill="#0b0e17" />
  <text x="500" y="30" text-anchor="middle" fill="#e8ecff" font-size="18" font-weight="700">
    Representative Circuit — Work Room 1 (ESP32 + Relay Bank + Current Sense)
  </text>
  <text x="500" y="50" text-anchor="middle" fill="#8a92b2" font-size="11">
    Low-voltage control side only shown wired; mains AC side is conceptual (see circuit-schematic.md §4)
  </text>

  <!-- ESP32 -->
  <rect x="60" y="90" width="160" height="300" rx="10" fill="#141a2b" stroke="#7fd4ff" stroke-width="2" />
  <text x="140" y="115" text-anchor="middle" fill="#7fd4ff" font-size="13" font-weight="700">ESP32 DevKit</text>
  <g font-size="11" fill="#e8ecff">
    <text x="75" y="145">GPIO16 ●</text>
    <text x="75" y="170">GPIO17 ●</text>
    <text x="75" y="195">GPIO18 ●</text>
    <text x="75" y="220">GPIO19 ●</text>
    <text x="75" y="245">GPIO21 ●</text>
    <text x="75" y="285">GPIO34 (ADC) ●</text>
    <text x="75" y="330">5V ●</text>
    <text x="75" y="355">GND ●</text>
  </g>

  <!-- Relay module -->
  <rect x="380" y="90" width="220" height="260" rx="10" fill="#141a2b" stroke="#ff8a3d" stroke-width="2" />
  <text x="490" y="115" text-anchor="middle" fill="#ff8a3d" font-size="13" font-weight="700">5-Ch Relay Module</text>
  <text x="490" y="132" text-anchor="middle" fill="#8a92b2" font-size="10">opto-isolated, active-LOW</text>
  <g font-size="11" fill="#e8ecff">
    <text x="395" y="160">IN1 ● — Fan 1</text>
    <text x="395" y="185">IN2 ● — Fan 2</text>
    <text x="395" y="210">IN3 ● — Light 1</text>
    <text x="395" y="235">IN4 ● — Light 2</text>
    <text x="395" y="260">IN5 ● — Light 3</text>
    <text x="395" y="300">VCC ●</text>
    <text x="395" y="325">GND ●</text>
  </g>
  <text x="490" y="345" text-anchor="middle" fill="#6b7aa0" font-size="9.5">COM/NO per channel → mains (see §4, not wired here)</text>

  <!-- Current sensor -->
  <rect x="380" y="400" width="220" height="120" rx="10" fill="#141a2b" stroke="#37e08f" stroke-width="2" />
  <text x="490" y="425" text-anchor="middle" fill="#37e08f" font-size="13" font-weight="700">ACS712 Current Sensor</text>
  <text x="490" y="442" text-anchor="middle" fill="#8a92b2" font-size="10">(Wokwi: potentiometer stand-in, §5)</text>
  <g font-size="11" fill="#e8ecff">
    <text x="395" y="470">OUT ●</text>
    <text x="395" y="490">VCC ●</text>
    <text x="395" y="505">GND ●</text>
  </g>

  <!-- Wires: ESP32 -> Relay -->
  <line x1="220" y1="145" x2="380" y2="160" stroke="#4a5578" stroke-width="1.5" marker-end="url(#arrow2)" />
  <line x1="220" y1="170" x2="380" y2="185" stroke="#4a5578" stroke-width="1.5" marker-end="url(#arrow2)" />
  <line x1="220" y1="195" x2="380" y2="210" stroke="#4a5578" stroke-width="1.5" marker-end="url(#arrow2)" />
  <line x1="220" y1="220" x2="380" y2="235" stroke="#4a5578" stroke-width="1.5" marker-end="url(#arrow2)" />
  <line x1="220" y1="245" x2="380" y2="260" stroke="#4a5578" stroke-width="1.5" marker-end="url(#arrow2)" />
  <line x1="220" y1="330" x2="380" y2="300" stroke="#4a5578" stroke-width="1.5" marker-end="url(#arrow2)" />
  <line x1="220" y1="355" x2="380" y2="325" stroke="#4a5578" stroke-width="1.5" marker-end="url(#arrow2)" />

  <!-- Wires: ESP32 -> Current sensor -->
  <path d="M220,285 C300,285 300,470 380,470" fill="none" stroke="#4a5578" stroke-width="1.5" marker-end="url(#arrow2)" />
  <path d="M220,332 C310,332 310,490 380,490" fill="none" stroke="#4a5578" stroke-width="1.5" marker-end="url(#arrow2)" />
  <path d="M220,357 C320,357 320,505 380,505" fill="none" stroke="#4a5578" stroke-width="1.5" marker-end="url(#arrow2)" />

  <!-- Devices -->
  <g>
    <circle cx="700" cy="150" r="26" fill="#1c2333" stroke="#7fd4ff" stroke-width="2" />
    <text x="700" y="155" text-anchor="middle" fill="#7fd4ff" font-size="16">🌀</text>
    <text x="740" y="155" fill="#e8ecff" font-size="12">Fan 1 (DC motor in sim)</text>

    <circle cx="700" cy="205" r="26" fill="#1c2333" stroke="#7fd4ff" stroke-width="2" />
    <text x="700" y="210" text-anchor="middle" fill="#7fd4ff" font-size="16">🌀</text>
    <text x="740" y="210" fill="#e8ecff" font-size="12">Fan 2 (DC motor in sim)</text>

    <circle cx="700" cy="260" r="20" fill="#1c2333" stroke="#ffd873" stroke-width="2" />
    <text x="700" y="266" text-anchor="middle" fill="#ffd873" font-size="14">💡</text>
    <text x="740" y="265" fill="#e8ecff" font-size="12">Light 1 (LED in sim)</text>

    <circle cx="700" cy="305" r="20" fill="#1c2333" stroke="#ffd873" stroke-width="2" />
    <text x="700" y="311" text-anchor="middle" fill="#ffd873" font-size="14">💡</text>
    <text x="740" y="310" fill="#e8ecff" font-size="12">Light 2 (LED in sim)</text>

    <circle cx="700" cy="350" r="20" fill="#1c2333" stroke="#ffd873" stroke-width="2" />
    <text x="700" y="356" text-anchor="middle" fill="#ffd873" font-size="14">💡</text>
    <text x="740" y="355" fill="#e8ecff" font-size="12">Light 3 (LED in sim)</text>
  </g>

  <line x1="600" y1="160" x2="674" y2="150" stroke="#ff8a3d" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow2)" />
  <line x1="600" y1="185" x2="674" y2="205" stroke="#ff8a3d" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow2)" />
  <line x1="600" y1="210" x2="680" y2="260" stroke="#ff8a3d" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow2)" />
  <line x1="600" y1="235" x2="680" y2="305" stroke="#ff8a3d" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow2)" />
  <line x1="600" y1="260" x2="680" y2="350" stroke="#ff8a3d" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow2)" />
  <text x="605" y="150" fill="#6b7aa0" font-size="9">COM/NO (mains, conceptual)</text>

  <rect x="650" y="410" width="300" height="110" rx="10" fill="#141a2b" stroke="#2c3552" stroke-width="2" />
  <text x="665" y="432" fill="#e8ecff" font-size="12" font-weight="700">Legend</text>
  <text x="665" y="452" fill="#9aa2c0" font-size="10.5">— solid arrow: low-voltage DC control wiring (built)</text>
  <text x="665" y="470" fill="#9aa2c0" font-size="10.5">- - dashed arrow: relay-switched mains path (conceptual)</text>
  <text x="665" y="488" fill="#9aa2c0" font-size="10.5">Full pin table + AC wiring notes: circuit-schematic.md</text>
  <text x="665" y="506" fill="#9aa2c0" font-size="10.5">Repeat x3 (or scale to 1 ESP32/room) for all rooms</text>
</svg>
